# ============================================
# Linux.do 专用代理组配置补丁
# ============================================
# 使用说明：
# 1. 将下面的代理组添加到你的 proxy-groups 部分（在 "自定义组" 之后）
# 2. 将规则添加到 rules 部分（在 "自定义规则" 之后）
# ============================================

# === 代理组配置 ===
# 添加到 proxy-groups 部分：

  - name: Linux.do
    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Server.png
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 全球优选
      - 香港节点
      - 日本节点
      - 狮城节点
      - 美国节点
      - 台湾节点
      - 韩国节点
      - 欧洲节点
      - 东南亚节点
      - 土耳其节点
      - 其他地区
      - 全球手动

# === 规则配置 ===
# 添加到 rules 部分（在 "# === 自定义规则 ===" 之后）：

  # === Linux.do 专用规则 ===
  - DOMAIN-SUFFIX,linux.do,Linux.do
  - DOMAIN,linux.do,Linux.do

# ==================== 规则 ====================
rules:
  # === DNS防泄露 ===
  - RULE-SET,prevent_dns_leak,漏网之鱼

  # === 直连规则 (最高优先级) ===
  - RULE-SET,Lan_Domain,全球直连
  - RULE-SET,Lan_IP,全球直连,no-resolve
  - RULE-SET,UnBan,全球直连
  - RULE-SET,GoogleCN,全球直连
  - RULE-SET,SteamCN,全球直连
  - RULE-SET,Direct_Domain,全球直连
  - RULE-SET,ChinaMedia,国内媒体
  - RULE-SET,Alibaba_Domain,阿里服务
  - RULE-SET,Alibaba_IP,阿里服务,no-resolve
  - RULE-SET,China_Domain,全球直连
  - RULE-SET,China_YYDS_Domain,全球直连
  - RULE-SET,China_IP,全球直连
  - RULE-SET,China_YYDS_IP,全球直连
  - RULE-SET,Download,全球直连

  # === 拦截规则 ===
  - RULE-SET,BanAD,全球拦截
  - RULE-SET,BanProgramAD,应用净化

  # === AI 服务 ===
  - DOMAIN,browser.events.data.microsoft.com,人工智能
  - DOMAIN-KEYWORD,antigravity,人工智能
  - RULE-SET,OpenAI_Domain,OpenAI
  - RULE-SET,OpenAI_IP,OpenAI,no-resolve
  - RULE-SET,Claude_Domain,Claude
  - RULE-SET,Gemini_Domain,Gemini
  - RULE-SET,AI,人工智能

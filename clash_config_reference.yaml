    icon: https://gcore.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png
    type: select
    proxies:
      - 全球手动
      - 自动选择
      - 全球优选
      - 负载均衡
      - 故障转移
      - 香港节点
      - 日本节点
      - 狮城节点
      - 美国节点
      - 台湾节点
      - 韩国节点
      - 欧洲节点
      - 东南亚节点
      - 土耳其节点
      - 其他地区
      - DIRECT

  - name: 全球手动
    icon: https://gcore.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    type: select
    include-all: true
    proxies:
      - DIRECT
      - 香港节点
      - 日本节点
      - 狮城节点
      - 美国节点
      - 台湾节点

# ==================== 规则 ====================
rules:
  # === QUIC 阻断 ===
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT

  # === 直连规则 ===
  - GEOSITE,PRIVATE,全球直连
  - GEOIP,PRIVATE,全球直连
  - RULE-SET,DirectList,全球直连

  # === 拦截规则 ===
  - RULE-SET,BanAD,广告拦截
  - RULE-SET,BanProgramAD,应用净化

  # === 自定义规则 ===
  - RULE-SET,Custom,custom

  # === Linux.do 专用规则 ===
  - DOMAIN-SUFFIX,linux.do,Linux.do
  - DOMAIN,linux.do,Linux.do

  # === AI 服务 ===
  - RULE-SET,OpenAI,OpenAI
  - RULE-SET,Claude,Claude
  - RULE-SET,Gemini,Gemini
  - GEOSITE,CATEGORY-AI-!CN,人工智能

  # === 特殊修正规则 ===
  - RULE-SET,TikTok,TikTok
  - RULE-SET,SteamFix,全球直连
  - RULE-SET,GoogleFCM,全球直连
  - DOMAIN,services.googleapis.cn,节点选择
  - GEOSITE,GOOGLE-PLAY@CN,全球直连
  - GEOSITE,MICROSOFT@CN,全球直连
  - GEOSITE,CN,全球直连
  - GEOIP,CN,全球直连

  # === 常用服务 ===
  - RULE-SET,Apple,苹果服务
  - RULE-SET,ChinaMedia,国内媒体
  - RULE-SET,GlobalMedia,国外媒体
  - RULE-SET,Twitter,推特X
  - RULE-SET,Discord,Discord
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Google,谷歌服务
  - RULE-SET,Telegram,电报消息
  - RULE-SET,YouTubeMusic,YouTube Music
  - RULE-SET,YouTube,油管视频
  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,Microsoft,微软服务
  - RULE-SET,OneDrive,OneDrive
